# https://blowfish.page/docs/configuration/

colorScheme = "slate"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["posts"]

[homepage]
  layout = "hero"
  homepageImage = "images/will-africano-s4a29qbHssg.jpg"
  showRecent = true
  showRecentItems = 10
  showMoreLink = true
  showMoreLinkDest = "/posts"

[article]
  showDate = true
  showDateUpdated = true
  showTableOfContents = true
  showReadingTime = true
  showRelatedContent = true
  relatedContentLimit = 3
  showEdit = false
  showWordCount = true

[list]
  showSummary = true
  groupByYear = true
  showTableOfContents = false
  cardView = true

[analytics.goatcounter]
  code = "arvimal"
